<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>飲食紀錄追蹤</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --bg-secondary: #f5f4f0;
  --bg-tertiary: #eeede9;
  --text: #1a1a18;
  --text-secondary: #6b6a65;
  --text-tertiary: #9e9d98;
  --border: rgba(0,0,0,0.12);
  --border-mid: rgba(0,0,0,0.2);
  --green: #0f6e56;
  --red: #a32d2d;
  --radius-md: 8px;
  --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg-secondary: #252522;
    --bg-tertiary: #2e2e2b;
    --text: #f0efe9;
    --text-secondary: #a09f99;
    --text-tertiary: #6b6a65;
    --border: rgba(255,255,255,0.1);
    --border-mid: rgba(255,255,255,0.18);
    --green: #5dcaa5;
    --red: #f09595;
  }
}
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; }
.app { max-width: 680px; margin: 0 auto; padding: 0 0 4rem; }
.header { padding: 1.5rem 1rem 0; margin-bottom: 1rem; }
.header h1 { font-size: 18px; font-weight: 500; }
.tab-bar { display: flex; border-bottom: 0.5px solid var(--border); margin: 0 1rem 1.5rem; overflow-x: auto; }
.tab { padding: 9px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; white-space: nowrap; }
.tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
.section { display: none; padding: 0 1rem; }
.section.active { display: block; }
.date-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
.date-row input[type=date] { height: 36px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 0 10px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); }
.weight-wrap { display: flex; align-items: center; gap: 6px; }
.weight-wrap input { width: 80px; height: 36px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 0 10px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); }
.unit { font-size: 13px; color: var(--text-secondary); }
.toggle-group { display: flex; gap: 4px; margin-left: auto; }
.toggle-btn { padding: 7px 14px; font-size: 13px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); cursor: pointer; background: none; color: var(--text-secondary); font-family: inherit; }
.toggle-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.food-table { width: 100%; border-collapse: collapse; margin-bottom: 0.5rem; }
.food-table th { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-align: right; padding: 0 5px 8px; }
.food-table th:nth-child(2) { text-align: left; }
.food-table td { padding: 2px 3px; vertical-align: middle; }
.row-label { font-size: 11px; color: var(--text-tertiary); text-align: center; width: 24px; }
.food-table input { width: 100%; height: 34px; border: 0.5px solid var(--border); border-radius: 5px; padding: 0 7px; font-size: 13px; text-align: right; background: var(--bg); color: var(--text); font-family: inherit; }
.food-table input[type=text] { text-align: left; }
.food-table input:focus { outline: none; border-color: var(--border-mid); }
.food-table input.modified { border-color: var(--green); }
.divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
.summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
.metric-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; }
.metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
.metric-value { font-size: 22px; font-weight: 500; }
.metric-sub { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; min-height: 14px; }
.metric-delta { font-size: 12px; margin-top: 3px; }
.delta-over { color: var(--red); }
.delta-under { color: var(--text-secondary); }
.delta-ok { color: var(--green); }
.btn { width: 100%; margin-top: 1rem; height: 44px; font-size: 14px; font-weight: 500; border-radius: var(--radius-md); cursor: pointer; font-family: inherit; }
.btn-primary { background: var(--text); color: var(--bg); border: none; }
.btn-secondary { background: none; border: 0.5px solid var(--border-mid); color: var(--text-secondary); }
.btn-danger { background: none; border: 0.5px solid rgba(163,45,45,0.4); color: var(--red); }
.saved-badge { display: block; font-size: 12px; color: var(--green); margin-top: 8px; text-align: center; opacity: 0; transition: opacity 0.3s; height: 16px; }
.saved-badge.show { opacity: 1; }
.week-avg-card { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.week-avg-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
.macro-bar { margin-bottom: 10px; }
.macro-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
.macro-bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 3px; }
.week-day-card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 8px; background: var(--bg); }
.week-day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.week-day-title { font-size: 14px; font-weight: 500; }
.week-day-meta { font-size: 12px; color: var(--text-secondary); }
.week-day-macros { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; font-size: 12px; color: var(--text-secondary); }
.week-day-macros span { font-size: 15px; font-weight: 500; color: var(--text); display: block; }
.empty-day { color: var(--text-tertiary); font-style: italic; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 14px; }
.trend-wrap { position: relative; width: 100%; height: 260px; }
.export-row { display: flex; gap: 8px; margin-top: 1rem; }
.export-row button { flex: 1; height: 40px; font-size: 13px; border-radius: var(--radius-md); cursor: pointer; font-family: inherit; background: none; border: 0.5px solid var(--border-mid); color: var(--text-secondary); }
.settings-group { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.settings-group-title { font-size: 13px; font-weight: 500; margin-bottom: 1rem; color: var(--text); }
.settings-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.settings-row:last-child { margin-bottom: 0; }
.settings-label { font-size: 13px; color: var(--text-secondary); flex: 1; }
.settings-input { width: 90px; height: 36px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 0 10px; font-size: 13px; text-align: right; background: var(--bg); color: var(--text); font-family: inherit; }
.settings-unit { font-size: 12px; color: var(--text-tertiary); width: 36px; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>飲食紀錄追蹤</h1></div>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('daily')">今日記錄</button>
    <button class="tab" onclick="showTab('week')">本週彙整</button>
    <button class="tab" onclick="showTab('trend')">體重趨勢</button>
    <button class="tab" onclick="showTab('settings')">目標設定</button>
  </div>

  <div class="section active" id="tab-daily">
    <div class="date-row">
      <input type="date" id="date-input" />
      <div class="weight-wrap">
        <input type="number" id="weight-input" placeholder="體重" step="0.05" />
        <span class="unit">kg</span>
      </div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-train" onclick="setDayType('train')">訓練日</button>
        <button class="toggle-btn" id="btn-rest" onclick="setDayType('rest')">休息日</button>
      </div>
    </div>
    <table class="food-table">
      <thead>
        <tr>
          <th></th><th>食物名稱</th><th>熱量 kcal</th><th>蛋白質 g</th><th>碳水 g</th><th>脂肪 g</th>
        </tr>
      </thead>
      <tbody id="food-rows"></tbody>
    </table>
    <hr class="divider" />
    <div class="summary-grid" id="summary-grid"></div>
    <button class="btn btn-primary" onclick="saveDay()">儲存今日記錄</button>
    <button class="btn btn-danger" style="margin-top:8px;" onclick="clearDay()">清除今日資料</button>
    <div class="saved-badge" id="saved-badge">已儲存</div>
  </div>

  <div class="section" id="tab-week">
    <div class="week-avg-card" id="week-avg-card"><div class="empty-state">本週尚無記錄</div></div>
    <div id="week-days-list"></div>
  </div>

  <div class="section" id="tab-trend">
    <div class="trend-wrap"><canvas id="trendChart" role="img" aria-label="體重趨勢折線圖"></canvas></div>
    <div class="export-row">
      <button onclick="exportData()">匯出資料（JSON）</button>
      <button onclick="document.getElementById('import-file').click()">匯入資料（JSON）</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)" />
    </div>
  </div>

  <div class="section" id="tab-settings">
    <div class="settings-group">
      <div class="settings-group-title">訓練日目標</div>
      <div class="settings-row"><span class="settings-label">每日熱量</span><input type="number" class="settings-input" id="s_train_kcal" /><span class="settings-unit">kcal</span></div>
      <div class="settings-row"><span class="settings-label">蛋白質</span><input type="number" class="settings-input" id="s_train_p" /><span class="settings-unit">g</span></div>
      <div class="settings-row"><span class="settings-label">碳水化合物</span><input type="number" class="settings-input" id="s_train_c" /><span class="settings-unit">g</span></div>
      <div class="settings-row"><span class="settings-label">脂肪</span><input type="number" class="settings-input" id="s_train_f" /><span class="settings-unit">g</span></div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">休息日目標</div>
      <div class="settings-row"><span class="settings-label">每日熱量</span><input type="number" class="settings-input" id="s_rest_kcal" /><span class="settings-unit">kcal</span></div>
      <div class="settings-row"><span class="settings-label">蛋白質</span><input type="number" class="settings-input" id="s_rest_p" /><span class="settings-unit">g</span></div>
      <div class="settings-row"><span class="settings-label">碳水化合物</span><input type="number" class="settings-input" id="s_rest_c" /><span class="settings-unit">g</span></div>
      <div class="settings-row"><span class="settings-label">脂肪</span><input type="number" class="settings-input" id="s_rest_f" /><span class="settings-unit">g</span></div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
    <div class="saved-badge" id="settings-badge">設定已儲存</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DEFAULT_TARGETS = {
  train: { kcal: 2100, p: 130, c: 240, f: 60 },
  rest:  { kcal: 1800, p: 130, c: 180, f: 60 }
};
const ROW_LABELS = ['1','2','3','4','5','6','7','8','補充'];
let dayType = 'train';
let trendChart = null;

function getTargets() {
  try { const r = localStorage.getItem('nt_targets'); if (r) return JSON.parse(r); } catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_TARGETS));
}

function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function storageKey(date) { return 'nt_day_' + date; }

function getAllDays() {
  const days = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('nt_day_')) { try { days.push(JSON.parse(localStorage.getItem(k))); } catch(e){} }
  }
  return days.sort((a,b) => a.date.localeCompare(b.date));
}

function setDayType(t) {
  dayType = t;
  document.getElementById('btn-train').className = 'toggle-btn' + (t==='train'?' active':'');
  document.getElementById('btn-rest').className = 'toggle-btn' + (t==='rest'?' active':'');
  updateSummary();
}

function buildRows(prefill) {
  const tbody = document.getElementById('food-rows');
  tbody.innerHTML = '';
  ROW_LABELS.forEach((label, i) => {
    const r = (prefill && prefill[i]) ? prefill[i] : {};
    const name = (r.name||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="row-label">${label}</td>
      <td><input type="text" id="f${i}_name" placeholder="食物名稱" value="${name}" oninput="markModified(this);updateSummary()" /></td>
      <td><input type="number" id="f${i}_kcal" placeholder="—" value="${r.kcal||''}" oninput="markModified(this);updateSummary()" /></td>
      <td><input type="number" id="f${i}_p" placeholder="—" value="${r.p||''}" oninput="markModified(this);updateSummary()" /></td>
      <td><input type="number" id="f${i}_c" placeholder="—" value="${r.c||''}" oninput="markModified(this);updateSummary()" /></td>
      <td><input type="number" id="f${i}_f" placeholder="—" value="${r.f||''}" oninput="markModified(this);updateSummary()" /></td>`;
    tbody.appendChild(tr);
  });
  updateSummary();
}

function markModified(el) { el.classList.add('modified'); }

function getRowData() {
  return ROW_LABELS.map((_, i) => ({
    name: document.getElementById('f'+i+'_name').value.trim(),
    kcal: parseFloat(document.getElementById('f'+i+'_kcal').value) || 0,
    p:    parseFloat(document.getElementById('f'+i+'_p').value) || 0,
    c:    parseFloat(document.getElementById('f'+i+'_c').value) || 0,
    f:    parseFloat(document.getElementById('f'+i+'_f').value) || 0,
  }));
}

function calcTotals(rows) {
  return {
    kcal: rows.reduce((s,r)=>s+(r.kcal||0),0),
    p:    rows.reduce((s,r)=>s+(r.p||0),0),
    c:    rows.reduce((s,r)=>s+(r.c||0),0),
    f:    rows.reduce((s,r)=>s+(r.f||0),0),
  };
}

function fmt1(v) { return Math.round(v * 10) / 10; }

function deltaHTML(d, unit) {
  if (d > 0) return '<span class="delta-over">超標 +' + fmt1(Math.abs(d)) + unit + '</span>';
  if (d < 0) return '<span class="delta-under">還差 ' + fmt1(Math.abs(d)) + unit + '</span>';
  return '<span class="delta-ok">剛好達標</span>';
}

function updateSummary() {
  const rows = getRowData();
  const tot = calcTotals(rows);
  const tgt = getTargets()[dayType];
  const dP = tot.p - tgt.p, dC = tot.c - tgt.c, dF = tot.f - tgt.f;
  const overKcal = (dP>0?dP*4:0)+(dC>0?dC*4:0)+(dF>0?dF*9:0);
  const adjKcal = tot.kcal + overKcal;
  const dKcal = adjKcal - tgt.kcal;
  const subKcal = overKcal > 0 ? '輸入 '+Math.round(tot.kcal)+' + 換算 +'+Math.round(overKcal) : '';
  document.getElementById('summary-grid').innerHTML =
    '<div class="metric-card"><div class="metric-label">熱量 kcal</div><div class="metric-value">'+Math.round(adjKcal)+'</div><div class="metric-sub">'+subKcal+'</div><div class="metric-delta">'+deltaHTML(Math.round(dKcal),'')+'</div></div>' +
    '<div class="metric-card"><div class="metric-label">蛋白質 g</div><div class="metric-value">'+fmt1(tot.p)+'</div><div class="metric-sub">目標 '+tgt.p+'g</div><div class="metric-delta">'+deltaHTML(fmt1(dP),'g')+'</div></div>' +
    '<div class="metric-card"><div class="metric-label">碳水 g</div><div class="metric-value">'+fmt1(tot.c)+'</div><div class="metric-sub">目標 '+tgt.c+'g</div><div class="metric-delta">'+deltaHTML(fmt1(dC),'g')+'</div></div>' +
    '<div class="metric-card"><div class="metric-label">脂肪 g</div><div class="metric-value">'+fmt1(tot.f)+'</div><div class="metric-sub">目標 '+tgt.f+'g</div><div class="metric-delta">'+deltaHTML(fmt1(dF),'g')+'</div></div>';
}

function loadDay(date) {
  document.getElementById('weight-input').value = '';
  const raw = localStorage.getItem(storageKey(date));
  if (!raw) { dayType = 'train'; setDayType('train'); buildRows(null); return; }
  const data = JSON.parse(raw);
  dayType = data.dayType || 'train';
  document.getElementById('btn-train').className = 'toggle-btn' + (dayType==='train'?' active':'');
  document.getElementById('btn-rest').className = 'toggle-btn' + (dayType==='rest'?' active':'');
  document.getElementById('weight-input').value = data.weight || '';
  buildRows(data.rows || []);
}

function saveDay() {
  const date = document.getElementById('date-input').value;
  if (!date) { alert('請先選擇日期'); return; }
  const weight = parseFloat(document.getElementById('weight-input').value) || null;
  localStorage.setItem(storageKey(date), JSON.stringify({ date, dayType, weight, rows: getRowData() }));
  document.querySelectorAll('.food-table input.modified').forEach(el => el.classList.remove('modified'));
  showBadge('saved-badge');
}

function clearDay() {
  const date = document.getElementById('date-input').value;
  if (!date) { alert('請先選擇日期'); return; }
  if (!confirm('確定清除 ' + date + ' 的所有記錄？')) return;
  localStorage.removeItem(storageKey(date));
  loadDay(date);
}

function showBadge(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function loadSettingsForm() {
  const t = getTargets();
  document.getElementById('s_train_kcal').value = t.train.kcal;
  document.getElementById('s_train_p').value = t.train.p;
  document.getElementById('s_train_c').value = t.train.c;
  document.getElementById('s_train_f').value = t.train.f;
  document.getElementById('s_rest_kcal').value = t.rest.kcal;
  document.getElementById('s_rest_p').value = t.rest.p;
  document.getElementById('s_rest_c').value = t.rest.c;
  document.getElementById('s_rest_f').value = t.rest.f;
}

function saveSettings() {
  const g = id => parseFloat(document.getElementById(id).value) || 0;
  const t = {
    train: { kcal: g('s_train_kcal'), p: g('s_train_p'), c: g('s_train_c'), f: g('s_train_f') },
    rest:  { kcal: g('s_rest_kcal'),  p: g('s_rest_p'),  c: g('s_rest_c'),  f: g('s_rest_f') }
  };
  localStorage.setItem('nt_targets', JSON.stringify(t));
  updateSummary();
  showBadge('settings-badge');
}

function getWeekDays(anchorDate) {
  const p = (anchorDate || getToday()).split('-');
  const d = new Date(+p[0], +p[1]-1, +p[2]);
  const dow = d.getDay();
  const sun = new Date(d);
  sun.setDate(d.getDate() - dow);
  return Array.from({length:7}, (_, i) => {
    const dd = new Date(sun);
    dd.setDate(sun.getDate() + i);
    return dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0') + '-' + String(dd.getDate()).padStart(2,'0');
  });
}

function renderWeek() {
  const anchor = document.getElementById('date-input').value || getToday();
  const weekDays = getWeekDays(anchor);
  const dayNames = ['週日','週一','週二','週三','週四','週五','週六'];
  const records = weekDays.map(d => { try { const r = localStorage.getItem(storageKey(d)); return r ? JSON.parse(r) : null; } catch(e){ return null; } });
  const filled = records.filter(Boolean);
  const avgCard = document.getElementById('week-avg-card');

  if (filled.length === 0) {
    avgCard.innerHTML = '<div class="empty-state">本週尚無記錄</div>';
    document.getElementById('week-days-list').innerHTML = '';
    return;
  }

  const sf = (rec, f) => rec.rows ? rec.rows.reduce((s,r)=>s+(r[f]||0),0) : 0;
  const ws = f => records.reduce((s,r) => s+(r?sf(r,f):0), 0);
  const avgKcal = Math.round(ws('kcal')/7);
  const avgP = fmt1(ws('p')/7), avgC = fmt1(ws('c')/7), avgF = fmt1(ws('f')/7);
  const wts = filled.filter(r=>r.weight).map(r=>r.weight);
  const avgWeight = wts.length ? fmt1(wts.reduce((a,b)=>a+b,0)/wts.length) : null;
  const tgt = getTargets().train;
  const bc = (v,t) => { const p=v/t; return p>1.05?'#E24B4A':p<0.85?'#888780':'#1D9E75'; };

  avgCard.innerHTML = '<div class="week-avg-title">本週 7 天平均（'+filled.length+' 天有記錄）'+(avgWeight?'・平均體重 '+avgWeight+' kg':'')+'</div>' +
    [['熱量',avgKcal,'kcal',tgt.kcal],['蛋白質',avgP,'g',tgt.p],['碳水',avgC,'g',tgt.c],['脂肪',avgF,'g',tgt.f]].map(([l,v,u,t]) => {
      const pct = Math.min(100, Math.round(v/t*100));
      return '<div class="macro-bar"><div class="macro-bar-label"><span>'+l+'</span><span>'+v+' '+u+' ／ 目標 '+t+' '+u+'（'+pct+'%）</span></div><div class="macro-bar-track"><div class="macro-bar-fill" style="width:'+pct+'%;background:'+bc(v,t)+';"></div></div></div>';
    }).join('');

  const today = getToday();
  document.getElementById('week-days-list').innerHTML = weekDays.map((d,i) => {
    const r = records[i];
    const isToday = d === today;
    const bs = isToday ? 'border-color:var(--border-mid);' : '';
    if (!r) return '<div class="week-day-card" style="'+bs+'"><div class="week-day-header"><span class="week-day-title">'+dayNames[i]+'<span style="font-weight:400;color:var(--text-secondary);margin-left:8px;">'+d+'</span></span><span class="week-day-meta empty-day">未記錄</span></div></div>';
    const tot = calcTotals(r.rows||[]);
    const tgtD = getTargets()[r.dayType||'train'];
    const dP=tot.p-tgtD.p, dC=tot.c-tgtD.c, dF=tot.f-tgtD.f;
    const ov=(dP>0?dP*4:0)+(dC>0?dC*4:0)+(dF>0?dF*9:0);
    return '<div class="week-day-card" style="'+bs+'"><div class="week-day-header"><span class="week-day-title">'+dayNames[i]+'<span style="font-weight:400;color:var(--text-secondary);margin-left:8px;">'+d+'</span></span><span class="week-day-meta">'+(r.weight?r.weight+' kg ・ ':'')+( r.dayType==='train'?'訓練日':'休息日')+'</span></div><div class="week-day-macros"><div>熱量<span>'+Math.round(tot.kcal+ov)+'</span></div><div>蛋白質<span>'+fmt1(tot.p)+'g</span></div><div>碳水<span>'+fmt1(tot.c)+'g</span></div><div>脂肪<span>'+fmt1(tot.f)+'g</span></div></div></div>';
  }).join('');
}

function renderTrend() {
  const days = getAllDays().filter(d => d.weight != null && d.weight !== '' && !isNaN(parseFloat(d.weight)));
  const wrap = document.getElementById('trendChart').parentElement;

  if (days.length < 2) {
    if (trendChart) { trendChart.destroy(); trendChart = null; }
    wrap.innerHTML = '<div class="empty-state">至少需要 2 天的體重記錄才能顯示趨勢</div>';
    return;
  }

  if (!document.getElementById('trendChart')) {
    wrap.innerHTML = '<canvas id="trendChart" role="img" aria-label="體重趨勢折線圖"></canvas>';
  }

  const labels = days.map(d => d.date.slice(5));
  const weights = days.map(d => parseFloat(d.weight));
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gc = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const tc = isDark ? '#6b6a65' : '#9e9d98';

  if (trendChart) { trendChart.destroy(); trendChart = null; }

  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels, datasets: [{ label: '體重', data: weights, borderColor: '#1D9E75', backgroundColor: isDark?'rgba(29,158,117,0.12)':'rgba(29,158,117,0.07)', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#1D9E75', fill: true, tension: 0.3 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(2)+' kg' } } },
      scales: {
        x: { grid: { color: gc }, ticks: { font: { size: 11 }, color: tc, maxRotation: 45 } },
        y: { grid: { color: gc }, ticks: { font: { size: 11 }, color: tc, callback: v => v.toFixed(1) },
          min: Math.floor((Math.min(...weights)-0.5)*2)/2,
          max: Math.ceil( (Math.max(...weights)+0.5)*2)/2 }
      }
    }
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(getAllDays(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '飲食記錄_' + getToday() + '.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { alert('格式錯誤'); return; }
      let count = 0;
      data.forEach(d => { if (d.date) { localStorage.setItem(storageKey(d.date), JSON.stringify(d)); count++; } });
      alert('成功匯入 ' + count + ' 筆記錄');
      renderTrend();
    } catch(err) { alert('匯入失敗：' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showTab(tab) {
  ['daily','week','trend','settings'].forEach((t,i) => {
    document.querySelectorAll('.tab')[i].className = 'tab'+(t===tab?' active':'');
    document.getElementById('tab-'+t).className = 'section'+(t===tab?' active':'');
  });
  if (tab === 'week') renderWeek();
  if (tab === 'trend') renderTrend();
  if (tab === 'settings') loadSettingsForm();
}

document.getElementById('date-input').value = getToday();
buildRows(null);
loadDay(getToday());
document.getElementById('date-input').addEventListener('change', function() { loadDay(this.value); });
</script>
</body>
</html>
