<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>訓練紀錄</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #f0f0f0;
    --text2: #888888;
    --text3: #555555;
    --accent: #c8f564;
    --accent-dim: rgba(200,245,100,0.12);
    --accent-dim2: rgba(200,245,100,0.06);
    --warn: #f5a623;
    --warn-dim: rgba(245,166,35,0.12);
    --danger: #ff5e5e;
    --success: #c8f564;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  .screen { display: none; min-height: 100vh; padding-bottom: 3rem; }
  .screen.active { display: block; }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    padding: 1rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    gap: 12px;
  }
  .topbar h1 { font-size: 17px; font-weight: 500; flex: 1; letter-spacing: -0.2px; }
  .back-btn {
    background: none; border: none; color: var(--text2);
    font-size: 22px; cursor: pointer; padding: 0; line-height: 1;
    width: 32px; display: flex; align-items: center;
  }
  .icon-btn {
    background: none; border: 0.5px solid var(--border2);
    color: var(--text2); width: 34px; height: 34px;
    border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .icon-btn:active { transform: scale(0.95); }

  /* HOME */
  .home-header { padding: 2rem 1.25rem 1.5rem; }
  .home-header .greeting { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .home-header h2 { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; }
  .home-header h2 span { color: var(--accent); font-weight: 500; }

  .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 1.25rem; }
  .day-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .day-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .day-card:active { transform: scale(0.97); border-color: var(--border2); }
  .day-card.has-recent::before { opacity: 1; }
  .day-card .dc-tag {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--text3); margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .day-card .dc-title { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .day-card .dc-sub { font-size: 12px; color: var(--text2); }
  .day-card .dc-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); display: inline-block;
    margin-right: 5px; vertical-align: middle;
  }

  .section-sep { height: 1px; background: var(--border); margin: 1.5rem 1.25rem; }

  /* DAY VIEW */
  .phase-block { padding: 1rem 1.25rem; }
  .phase-label {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--text3); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .phase-content {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.875rem 1rem;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }

  .ex-list { padding: 0 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .ex-row {
    display: flex; align-items: center;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.875rem 1rem;
    cursor: pointer; gap: 12px;
    transition: border-color 0.1s;
  }
  .ex-row:active { transform: scale(0.99); border-color: var(--border2); }
  .ex-row.done { border-color: rgba(200,245,100,0.3); }
  .ex-badge {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface2); border: 0.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--text2); flex-shrink: 0;
  }
  .ex-row.done .ex-badge {
    background: var(--accent-dim);
    border-color: rgba(200,245,100,0.4);
    color: var(--accent);
  }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ex-spec { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .ex-last { text-align: right; font-size: 11px; color: var(--text3); flex-shrink: 0; line-height: 1.5; }
  .ex-last-weight { font-size: 13px; color: var(--text2); font-weight: 500; }

  /* DETAIL VIEW */
  .detail-header { padding: 1.25rem; }
  .detail-spec {
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: var(--text3); line-height: 1.8;
  }

  .tip-box {
    margin: 0 1.25rem 1rem;
    background: var(--warn-dim);
    border: 0.5px solid rgba(245,166,35,0.3);
    border-radius: var(--radius-sm);
    padding: 0.875rem 1rem;
    font-size: 13px;
    color: var(--warn);
    line-height: 1.6;
  }
  .tip-box .tip-label {
    font-size: 10px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px; margin-bottom: 6px; opacity: 0.7;
  }

  .last-box {
    margin: 0 1.25rem 1.25rem;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.875rem 1rem;
  }
  .last-box .lb-label {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--text3); letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .last-box .lb-date { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
  .last-box .lb-set { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .last-box .lb-set span { color: var(--text); font-weight: 500; }
  .last-box .lb-note { font-size: 12px; color: var(--text3); margin-top: 8px; border-top: 0.5px solid var(--border); padding-top: 8px; font-style: italic; }
  .last-box .lb-empty { font-size: 13px; color: var(--text3); }

  /* SETS */
  .sets-section { padding: 0 1.25rem; }
  .sets-header {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 36px;
    gap: 8px; margin-bottom: 8px;
  }
  .sets-header span { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); text-align: center; letter-spacing: 0.3px; }
  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 36px;
    gap: 8px; margin-bottom: 8px; align-items: center;
  }
  .set-num { font-size: 12px; color: var(--text3); text-align: center; font-family: 'DM Mono', monospace; }
  .set-input {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    font-size: 16px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    text-align: center;
    width: 100%;
    transition: border-color 0.15s;
  }
  .set-input:focus { outline: none; border-color: rgba(200,245,100,0.5); }
  .set-input::placeholder { color: var(--text3); font-size: 13px; }
  .set-check {
    width: 36px; height: 40px;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text3);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.15s;
  }
  .set-check.on { background: var(--accent-dim); border-color: rgba(200,245,100,0.4); color: var(--accent); }
  .set-check:active { transform: scale(0.95); }

  .note-area {
    width: 100%;
    margin-top: 1rem;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    resize: none;
    line-height: 1.6;
  }
  .note-area:focus { outline: none; border-color: var(--border2); }
  .note-area::placeholder { color: var(--text3); }

  .save-btn {
    display: block;
    width: calc(100% - 2.5rem);
    margin: 1.25rem 1.25rem 0;
    padding: 15px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: transform 0.1s, opacity 0.1s;
  }
  .save-btn:active { transform: scale(0.98); opacity: 0.9; }

  /* SETTINGS */
  .settings-section { padding: 1rem 1.25rem; }
  .settings-section h3 { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 12px; }
  .setting-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    overflow: hidden;
  }
  .setting-row {
    display: flex; align-items: center;
    padding: 0.875rem 1rem; gap: 12px;
  }
  .setting-row .sr-info { flex: 1; }
  .setting-row .sr-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .setting-row .sr-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .setting-row .sr-actions { display: flex; gap: 6px; }
  .sm-btn {
    background: none; border: 0.5px solid var(--border2);
    color: var(--text2); width: 30px; height: 30px;
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .sm-btn:active { transform: scale(0.95); }
  .sm-btn.del { color: var(--danger); border-color: rgba(255,94,94,0.3); }
  .sm-btn.edit { color: var(--accent); border-color: rgba(200,245,100,0.3); }

  .day-setting-header {
    display: flex; align-items: center;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
  }
  .day-setting-header span { flex: 1; font-size: 14px; font-weight: 500; }
  .day-setting-header .dsh-meta { font-size: 11px; color: var(--text3); }

  .add-ex-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 0.75rem;
    background: none; border: 0.5px dashed var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text3); font-size: 13px;
    cursor: pointer; width: 100%; margin-top: 8px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, color 0.15s;
  }
  .add-ex-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 1.5rem 1.25rem 2rem;
    width: 100%;
    max-width: 480px;
  }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }
  .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 14px;
  }
  .modal input:focus, .modal select:focus { outline: none; border-color: rgba(200,245,100,0.4); }
  .modal select { appearance: none; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .modal-cancel {
    flex: 1; padding: 13px; background: none;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text2); font-size: 14px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .modal-confirm {
    flex: 1; padding: 13px; background: var(--accent);
    border: none; border-radius: var(--radius-sm);
    color: #0f0f0f; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #0f0f0f;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .chevron { color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="topbar">
    <h1>訓練紀錄</h1>
    <button class="icon-btn" onclick="showSettings()" title="設定">⚙</button>
  </div>
  <div class="home-header">
    <div class="greeting" id="greeting-date"></div>
    <h2>今天要練<br><span id="greeting-focus">哪個部位？</span></h2>
  </div>
  <div class="day-grid" id="day-grid"></div>
</div>

<!-- DAY VIEW -->
<div id="s-day" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showHome()">‹</button>
    <h1 id="day-title"></h1>
  </div>
  <div class="phase-block">
    <div class="phase-label">熱身</div>
    <div class="phase-content" id="warmup-text"></div>
  </div>
  <div class="phase-label" style="padding: 0 1.25rem 10px; font-size:10px; font-family:'DM Mono',monospace; color:var(--text3); letter-spacing:1px; text-transform:uppercase;">訓練動作</div>
  <div class="ex-list" id="ex-list"></div>
  <div class="section-sep"></div>
  <div class="phase-block">
    <div class="phase-label">收操</div>
    <div class="phase-content" id="cooldown-text"></div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="s-detail" class="screen">
  <div class="topbar">
    <button class="back-btn" id="detail-back-btn">‹</button>
    <h1 id="detail-name"></h1>
  </div>
  <div class="detail-header">
    <div class="detail-spec" id="detail-spec"></div>
  </div>
  <div id="tip-box" class="tip-box" style="display:none;">
    <div class="tip-label">教練提示</div>
    <div id="tip-text"></div>
  </div>
  <div class="last-box">
    <div class="lb-label">上次紀錄</div>
    <div id="last-content"></div>
  </div>
  <div class="sets-section">
    <div class="sets-header">
      <span></span><span>重量 kg</span><span>次數</span><span></span>
    </div>
    <div id="sets-container"></div>
    <textarea class="note-area" id="session-note" rows="2" placeholder="備註（可選）..."></textarea>
  </div>
  <button class="save-btn" onclick="saveSession()">儲存這次訓練</button>
</div>

<!-- SETTINGS -->
<div id="s-settings" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showHome()">‹</button>
    <h1>設定</h1>
  </div>
  <div id="settings-content"></div>
</div>

<!-- MODAL: Edit Exercise -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">編輯動作</h3>
    <label>動作名稱</label>
    <input type="text" id="m-name" placeholder="例：繩索坐姿划船">
    <div class="modal-row">
      <div>
        <label>組數</label>
        <input type="number" id="m-sets" min="1" max="6" inputmode="numeric" placeholder="3">
      </div>
      <div>
        <label>次數範圍</label>
        <input type="text" id="m-reps" placeholder="8–12">
      </div>
    </div>
    <label>組間休息</label>
    <input type="text" id="m-rest" placeholder="2–3 分鐘">
    <label>教練提示（可選）</label>
    <input type="text" id="m-tip" placeholder="技術重點...">
    <input type="hidden" id="m-dayid">
    <input type="hidden" id="m-exidx">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" onclick="saveExercise()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_DAYS = [
  {
    id: 1, label: 'Day 1', title: '上肢', weekday: '週一',
    warmup: '爬坡機 5 分鐘｜貓牛式 10 下｜肩外轉 左右各 10 下',
    cooldown: '滾筒放鬆闊背肌 左右各 30 秒 × 2｜滾筒放鬆背部 左右各 30 秒 × 2｜胸大肌伸展 左右各 30 秒 × 2｜闊背肌伸展 左右各 30 秒 × 2｜二頭肌伸展 左右各 30 秒 × 2｜肱三頭肌伸展 左右各 30 秒 × 2',
    exercises: [
      { id:'A', name:'繩索坐姿划船', sets:3, reps:'10–12', rest:'2–3 分鐘', tempo:'離心 2s / 向心 1s',
        tip:'背部保持中立，肚子微縮。拉的時候跟著繩索器械的方向走。' },
      { id:'B', name:'Hammer 窄握下拉', sets:2, reps:'10–12', rest:'2–3 分鐘', tempo:'離心 2s / 向心 1s',
        tip:'不要靠著前端。椅子調到幾乎最高，一手扶著前緣板，另一手拉動。身體可以微側朝拉動手的位置，記得身體維持不要被拉著走。' },
      { id:'C1', name:'啞鈴臥推', sets:3, reps:'10–12', rest:'2–3 分鐘', tempo:'離心 2s / 向心 1s',
        tip:'維持 8 字型的手部位置，每個人角度略有差異，但記得不要過度轉動手肘。' },
      { id:'C2', name:'槓鈴臥推', sets:3, reps:'10–12', rest:'2–3 分鐘', tempo:'離心 2s / 向心 1s',
        tip:'往上推時讓槓鈴在肩膀正上方，不要往頭的方向走太多。下來的位置在奶頭，小臂維持中立與地面垂直。如果肩膀不舒服就改回啞鈴臥推。' },
      { id:'D', name:'器械肩推', sets:2, reps:'10–12', rest:'2–3 分鐘', tempo:'離心 2s / 向心 1s',
        tip:'手臂下來不要太多，否則張力會消失，椅子不用過高。' },
      { id:'E', name:'啞鈴斜板肩伸彎舉', sets:2, reps:'12–15', rest:'1–2 分鐘', tempo:'離心 2s / 向心 1s',
        tip:'小肌群本來就很難拉重量，用次數來堆疊。如果頸部不舒服，頭可以抬起來離開椅背，或試著往前調高椅背角度。' },
      { id:'F', name:'繩索直槓三頭下壓', sets:2, reps:'12–15', rest:'1–2 分鐘', tempo:'離心 2s / 向心 1s',
        tip:'動作沒問題就持續加重量。' },
    ]
  },
  {
    id: 2, label: 'Day 2', title: '下肢', weekday: '週三',
    warmup: '爬坡機 5 分鐘｜偉大伸展 10 下｜動態腿後伸展 共 20 下',

function loadDays() {
  try {
    const saved = localStorage.getItem('wt_days');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DAYS));
}
function saveDays(days) {
  try { localStorage.setItem('wt_days', JSON.stringify(days)); } catch(e) {}
}
function getSessionKey(dayId, exId) { return `wt_sess_${dayId}_${exId}`; }
function loadSession(dayId, exId) {
  const defKey = `${dayId}_${exId}`;
  try {
    const saved = localStorage.getItem(getSessionKey(dayId, exId));
    if (saved) return JSON.parse(saved);
    if (LAST_SESSIONS[defKey]) return LAST_SESSIONS[defKey];
  } catch(e) {}
  return null;
}
function saveSessionData(dayId, exId, data) {
  try { localStorage.setItem(getSessionKey(dayId, exId), JSON.stringify(data)); } catch(e) {}
}

let DAYS = loadDays();
let currentDayId = null;
let currentExIdx = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showHome() {
  DAYS = loadDays();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-home').classList.add('active');
  renderHome();
}

function renderHome() {
  const now = new Date();
  document.getElementById('greeting-date').textContent =
    now.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  const weekday = now.getDay();
  const map = {1:'Day 1 上肢', 3:'Day 2 下肢', 5:'Day 3 上肢', 6:'Day 4 下肢'};
  document.getElementById('greeting-focus').textContent = map[weekday] || '選擇訓練日';

  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  DAYS.forEach(day => {
    const recentCount = day.exercises.filter(ex => {
      const s = loadSession(day.id, ex.id);
      return s && (Date.now() - s.date < 86400000 * 3);
    }).length;
    const card = document.createElement('div');
    card.className = 'day-card' + (recentCount > 0 ? ' has-recent' : '');
    card.innerHTML = `
      <div class="dc-tag">${day.weekday} · ${day.label}</div>
      <div class="dc-title">${day.title}</div>
      <div class="dc-sub">${recentCount > 0 ? `<span class="dc-dot"></span>${recentCount}/${day.exercises.length} 已記錄` : `${day.exercises.length} 個動作`}</div>`;
    card.onclick = () => showDay(day.id);
    grid.appendChild(card);
  });
}

function showDay(dayId) {
  currentDayId = dayId;
  const day = DAYS.find(d => d.id === dayId);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-day').classList.add('active');
  document.getElementById('day-title').textContent = `${day.label} · ${day.title}`;
  document.getElementById('warmup-text').textContent = day.warmup;
  document.getElementById('cooldown-text').textContent = day.cooldown;
  renderExList(day);
}

function renderExList(day) {
  const list = document.getElementById('ex-list');
  list.innerHTML = '';
  day.exercises.forEach((ex, idx) => {
    const sess = loadSession(day.id, ex.id);
    const isRecent = sess && (Date.now() - sess.date < 86400000 * 3);
    let lastWeightStr = '';
    if (sess) {
      const weights = sess.sets.filter(s => s.weight && s.weight !== '-').map(s => parseFloat(s.weight));
      if (weights.length) lastWeightStr = Math.max(...weights) + ' kg';
      const d = new Date(sess.date);
      const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
      lastWeightStr = `<div class="ex-last-weight">${lastWeightStr}</div><div>${dateStr}</div>`;
    } else {
      lastWeightStr = '<div>未記錄</div>';
    }
    const row = document.createElement('div');
    row.className = 'ex-row' + (isRecent ? ' done' : '');
    row.innerHTML = `
      <div class="ex-badge">${ex.id}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-spec">${ex.sets}組 · ${ex.reps}下</div>
      </div>
      <div class="ex-last">${lastWeightStr}</div>
      <div class="chevron">›</div>`;
    row.onclick = () => showDetail(idx);
    list.appendChild(row);
  });
}

function showDetail(exIdx) {
  currentExIdx = exIdx;
  const day = DAYS.find(d => d.id === currentDayId);
  const ex = day.exercises[exIdx];
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-detail').classList.add('active');
  document.getElementById('detail-name').textContent = ex.name;
  document.getElementById('detail-back-btn').onclick = () => showDay(currentDayId);
  document.getElementById('detail-spec').textContent =
    `${ex.sets} 組 × ${ex.reps} 下　${ex.tempo}　組間休息 ${ex.rest}`;

  const tipBox = document.getElementById('tip-box');
  if (ex.tip && ex.tip.trim()) {
    tipBox.style.display = 'block';
    document.getElementById('tip-text').textContent = ex.tip;
  } else {
    tipBox.style.display = 'none';
  }

  const sess = loadSession(currentDayId, ex.id);
  const lastEl = document.getElementById('last-content');
  if (sess) {
    const d = new Date(sess.date);
    const dateStr = d.toLocaleDateString('zh-TW', { month:'long', day:'numeric', weekday:'short' });
    let html = `<div class="lb-date">${dateStr}</div>`;
    sess.sets.forEach((s, i) => {
      html += `<div class="lb-set">第 ${i+1} 組　<span>${s.weight} kg × ${s.reps} 下</span></div>`;
    });
    if (sess.note) html += `<div class="lb-note">${sess.note}</div>`;
    lastEl.innerHTML = html;
  } else {
    lastEl.innerHTML = '<div class="lb-empty">尚無紀錄</div>';
  }

  const MAX_SETS = 3;
  const container = document.getElementById('sets-container');
  container.innerHTML = '';
  for (let i = 0; i < MAX_SETS; i++) {
    const prevW = sess && sess.sets[i] ? sess.sets[i].weight : '';
    const prevR = sess && sess.sets[i] ? sess.sets[i].reps : '';
    const isTarget = i < ex.sets;
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = `
      <div class="set-num" style="${!isTarget ? 'opacity:0.4' : ''}">${i+1}</div>
      <input class="set-input" type="number" inputmode="decimal" step="0.5"
        placeholder="${prevW || 'kg'}" id="w_${i}" style="${!isTarget ? 'opacity:0.4' : ''}">
      <input class="set-input" type="number" inputmode="numeric"
        placeholder="${prevR || '次'}" id="r_${i}" style="${!isTarget ? 'opacity:0.4' : ''}">
      <button class="set-check" id="chk_${i}" onclick="toggleCheck(${i})">✓</button>`;
    container.appendChild(row);
  }
  document.getElementById('session-note').value = '';
}

function toggleCheck(i) {
  document.getElementById('chk_' + i).classList.toggle('on');
}

function saveSession() {
  const day = DAYS.find(d => d.id === currentDayId);
  const ex = day.exercises[currentExIdx];
  const sets = [];
  let hasData = false;
  for (let i = 0; i < 3; i++) {
    const w = document.getElementById('w_' + i).value.trim();
    const r = document.getElementById('r_' + i).value.trim();
    if (w || r) {
      hasData = true;
      sets.push({ weight: w || '-', reps: r || '-', done: document.getElementById('chk_' + i).classList.contains('on') });
    }
  }
  if (!hasData) { showToast('請至少填入一組數據'); return; }
  const note = document.getElementById('session-note').value.trim();
  saveSessionData(currentDayId, ex.id, { date: Date.now(), sets, note });
  showToast('已儲存 ✓');
  setTimeout(() => showDay(currentDayId), 800);
}

function saveExercise() {
  const dayId = parseInt(document.getElementById('m-dayid').value);
  const exIdx = parseInt(document.getElementById('m-exidx').value);
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('請填入動作名稱'); return; }
  const day = DAYS.find(d => d.id === dayId);
  const exData = {
    id: exIdx >= 0 ? day.exercises[exIdx].id : String.fromCharCode(65 + day.exercises.length),
    name,
    sets: parseInt(document.getElementById('m-sets').value) || 3,
    reps: document.getElementById('m-reps').value || '10–12',
    rest: document.getElementById('m-rest').value || '2–3 分鐘',
    tempo: '離心 2s / 向心 1s',
    tip: document.getElementById('m-tip').value.trim(),
  };
  if (exIdx >= 0) {
    day.exercises[exIdx] = exData;
  } else {
    day.exercises.push(exData);
  }
  saveDays(DAYS);
  closeModal();
  renderSettings();
  showToast('已儲存 ✓');
}

function deleteExercise(dayId, exIdx) {
  if (!confirm('確定要刪除這個動作？')) return;
  const day = DAYS.find(d => d.id === dayId);
  day.exercises.splice(exIdx, 1);
  saveDays(DAYS);
  renderSettings();
  showToast('已刪除');
}

showHome();
</script>
</body>
</html>
